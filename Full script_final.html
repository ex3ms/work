<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Скрипт для отдела продаж "Паркс-инжиниринг" – все отрасли</title>
    <style>

        .workspace { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-header { background: #f5f5f5; padding: 16px 20px; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; gap: 6px; }

        .logo-area { display: flex; align-items: center; margin-right: 16px; }
        .logo-img { height: 110px; width: auto; }

        .industry-select select { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }

        .industry-description { 
            font-size: 15px; 
            color: #444; 
            margin-bottom: 16px; 
            line-height: 1.7; 
        }

            left: 50%;
            transform: translateX(-50%);

            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;

            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }

        body.dark .switch-tabs { border-bottom-color: #444; }

        .switch-tab.active { color: #2b579a; border-bottom-color: #2b579a; font-weight: 600; }
        body.dark .switch-tab { color: #aaa; }
        body.dark .switch-tab.active { color: #5a9cf8; border-bottom-color: #5a9cf8; }

        .script-block { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
        .block-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #fafafa; cursor: pointer; user-select: none; }
        .block-header:hover { background: #f0f0f0; }
        .block-title { font-weight: 600; }
        .block-goal { font-size: 12px; color: #888; }
        .block-body { padding: 12px 14px; border-top: 1px solid #ddd; background: #fff; }
        .script-text { background: #f9f9f9; border-left: 3px solid #2b579a; padding: 10px 14px; border-radius: 4px; font-style: italic; margin-bottom: 8px; white-space: pre-line; font-size: 14px; line-height: 1.35; }

        .collapsed .arrow { transform: rotate(0deg); }
        .arrow { transition: transform 0.2s; display: inline-block; width: 20px; text-align: center; }
        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
            color: #888;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .copy-btn:hover { color: #2b579a; background: #e8f0fe; }
        body.dark .copy-btn { color: #aaa; }
        body.dark .copy-btn:hover { color: #5a9cf8; background: #1e3a5f; }

        .script-speech { }
        .script-condition-positive { color: #2e7d32; font-weight: bold; margin: 4px 0; display: flex; align-items: center; gap: 4px; }
        .script-condition-negative { color: #c62828; font-weight: bold; margin: 4px 0; display: flex; align-items: center; gap: 4px; }
        .script-condition-neutral { color: #555; font-weight: bold; margin: 4px 0; display: flex; align-items: center; gap: 4px; }
        .script-line { margin-bottom: 4px; }

        .brief-label, .detail-label { font-weight: 700; display: inline-block; margin-right: 4px; font-style: normal; }

        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .lightbox-close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: #fff; cursor: pointer; background: none; border: none; line-height: 1; }

        .objections-panel.fullscreen { width: 100vw; height: 100vh; }

        body.dark .obj-group.expanded .obj-group-title { border-bottom-color: #444; }
        .obj-group.expanded .group-arrow { transform: rotate(90deg); }
        .obj-group-content { display: none; padding: 12px; }
        body.dark .obj-group-content { background: #2a2a2a; }
        .obj-group.expanded .obj-group-content { display: block; }
        .obj-item { margin-bottom: 14px; }
        .obj-question { font-weight: 600; margin-bottom: 6px; color: #c62828; font-size: 14px; }
        .obj-answer { background: #f9f9f9; padding: 8px 12px; border-left: 3px solid #4caf50; border-radius: 4px; white-space: pre-line; font-size: 13px; margin-bottom: 4px; }
        body.dark .obj-answer { background: #1e1e1e; }
        .obj-answer-list { margin: 4px 0 0 16px; padding: 0; list-style: none; }
        .obj-answer-list li { margin-bottom: 6px; display: flex; gap: 6px; }
        .obj-answer-letter { font-weight: 600; color: #2b579a; min-width: 18px; }

        .obj-quick-links { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .obj-quick-link { padding: 4px 10px; background: #e8f0fe; color: #2b579a; border-radius: 12px; cursor: pointer; font-size: 12px; white-space: nowrap; border: 1px solid transparent; }
        body.dark .obj-quick-link { background: #1e3a5f; color: #5a9cf8; }
        .obj-quick-link:hover { background: #d0e3fc; border-color: #2b579a; }
        body.dark .obj-quick-link:hover { background: #2a4a7f; }

        .search-input { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; width: 150px; }
        body.dark .search-input { background: #444; border-color: #555; color: #ddd; }

        .btn { padding: 6px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #ccc; background: #fff; color: #333; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #2b579a; color: white; border-color: #2b579a; font-size: 13px; }
        .btn-danger { background: none; border: 1px solid #dc3545; color: #dc3545; }
        .btn-light { border: 1px solid #ccc; background: #f9f9f9; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        .overlay.show { display: block; }

        .hint-container { display: flex; align-items: center; background: #e8f0fe; border-radius: 8px; padding: 4px 14px 4px 10px; box-shadow: 0 2px 8px rgba(43,87,154,0.15); flex-shrink: 0; margin-left: 20px; }
        body.dark .hint-container { background: #1e3a5f; }
        .hint-arrow { display: inline-block; width: 0; height: 0; border-top: 14px solid transparent; border-bottom: 14px solid transparent; border-left: 20px solid #2b579a; margin-right: 8px; animation: gentle-bounce 2s infinite ease-in-out; }
        @keyframes gentle-bounce { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-6px); } }

        .top-companies { font-size: 12px; color: #444; margin-top: 8px; }
        body.dark .top-companies { color: #bbb; }
        .top-companies summary { cursor: pointer; font-weight: 600; color: #2b579a; margin-bottom: 4px; }
        body.dark .top-companies summary { color: #5a9cf8; }
        .top-companies ul { margin: 4px 0 0 16px; padding: 0; list-style: none; }
        .top-companies li { margin-bottom: 4px; }
        .company-name { font-weight: 600; color: #2b579a; text-decoration: none; border-bottom: 1px dotted #2b579a; }
        .company-name:hover { border-bottom: 1px solid #2b579a; }
        .company-detail { color: #666; font-size: 11px; }
        body.dark .company-detail { color: #aaa; }

        .letter-box { margin-top: 8px; background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
        .letter-options { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
        .letter-options label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 13px; }
        .letter-preview { 
            white-space: pre-line; 
            font-size: 13px; 
            background: #fff; 
            padding: 8px; 
            border: 1px solid #eee; 
            border-radius: 4px; 
            margin-top: 8px; 
            width: 100%; 
            font-family: inherit; 
            resize: vertical; 
            min-height: 200px;
            box-sizing: border-box;
        }

        .letter-manager-field { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .letter-manager-field label { font-weight: 500; font-size: 13px; }
        .letter-manager-field input { padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }

</head>
<body>
<div class="workspace">
    <div class="card">
        <div class="card-header">
            <div class="header-row">
                <div class="header-title" style="display: flex; align-items: center;">
                    <div class="logo-area">
                        <img class="logo-img" src="https://parxeng.com/static/assets/images/logo.svg" alt="Логотип Паркс-Инжиниринг" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="logo-fallback" style="display:none;">ПИ</div>
                    </div>
                    <h2>📞 Скрипт для отдела продаж "Паркс-инжиниринг"</h2>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button class="btn btn-light" onclick="toggleTheme()" title="Тёмная/светлая тема">🌙</button>
                    <div class="hint-container">
                        <span class="hint-arrow"></span>
                        <button class="btn btn-primary" id="openPanelBtn">📋 Возражения и готовые ответы</button>
                    </div>
                </div>
            </div>
            <div class="header-subtitle">Все отрасли: фармацевтика, упаковка, пищевое оборудование, приборостроение и другие</div>
        </div>
        <div class="card-body">
            <div class="approach-tabs" id="approachTabs">
                <button class="approach-tab active" data-approach="ilya">🧬 Отраслевой</button>
                <button class="approach-tab" data-approach="vlad">📋 Универсальный</button>
            </div>

            <div id="industrySelector" class="industry-select">
                <label for="industrySelect">🏭 Отрасль:</label>
                <select id="industrySelect">
                    <option value="pharma">💊 Фармацевтика</option>
                    <option value="packaging">📦 Упаковка</option>
                    <option value="paper_hygiene">📄 Бумажные изделия и переработка бумаги/картона</option>
                    <option value="instruments">🔬 Приборы и инструменты (измерение, тестирование)</option>
                    <option value="food">🍔 Пищевая промышленность</option>
                    <option value="research">🔭 Научные исследования и разработки</option>
                    <option value="medical">⚕️ Медицинские инструменты и оборудование</option>
                    <option value="oil_gas">🛢️ Нефтегазовая отрасль</option>
                    <option value="energy">⚡️ Энергетика</option>
                    <option value="electronics">📡 Электроника и связь</option>
                </select>
            </div>

            <div id="industryDescription" class="industry-description"></div>

            <div style="display: flex; justify-content: flex-end; margin-bottom: 12px; gap: 8px;">
                <button class="btn btn-light" onclick="printScript()" title="Печатная версия">🖨️ Печать</button>
                <button class="btn btn-light" id="toggleAllBtn" onclick="toggleAllBlocks()">
                    <span id="toggleAllIcon">⇵</span> <span id="toggleAllText">Развернуть всё</span>
                </button>
            </div>

            <div id="approachContent"></div>
        </div>
    </div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="Увеличенное фото">
</div>

<div class="overlay" id="overlay"></div>

<!-- Выдвижная панель возражений -->
<div class="objections-panel" id="objPanel">
    <div class="panel-header">
        <h3 style="font-size:16px;">🛡️ Возражения и готовые ответы</h3>
        <div style="display: flex; gap: 8px; align-items: center;">
            <input type="text" class="search-input" id="objSearch" placeholder="Поиск..." oninput="renderObjections()">
            <button class="btn btn-light" id="toggleFullscreenBtn" title="Развернуть на весь экран">⛶</button>
            <button class="btn btn-danger" id="closePanelBtn">✕ Закрыть</button>
        </div>
    </div>
    <div class="panel-body" id="objContent"></div>
</div>

    return Array.from({ length: 6 }, (_, i) => ({

function formatDescription(text) {
    let html = text;
    for (const [term, tooltip] of Object.entries(equipmentTooltips)) {
        const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        html = html.replace(regex, `<span class="equipment-term" data-tooltip="${tooltip}">$1</span>`);
    }
    return html;
}

function renderTopCompanies(industryKey) {
    const companies = topCompanies[industryKey];
    if (!companies || companies.length === 0) return '';
    let html = `<ul style="margin: 4px 0 0 16px; padding: 0; list-style: none;">`;
    companies.forEach(c => {
        let url;
        if (c.url) {
            url = c.url;
        } else {
            url = `https://yandex.ru/search/?text=${encodeURIComponent(c.name + ' компания')}`;
        }
        html += `<li style="margin-bottom: 4px;">
            <a href="${url}" target="_blank" class="company-name">${c.name}</a>
            — <span class="company-detail">${c.detail}</span>
        </li>`;
    });
    html += '</ul>';
    return html;
}

// Функция замены плейсхолдеров (безопасное обращение к полю имени)
function replacePlaceholders(text) {
    const nameField = document.getElementById('managerNameLetter');
    const name = nameField ? nameField.value.trim() : localStorage.getItem('managerName') || 'Имя';
    // [Название клиента] заменяем на "Компания"
    return text.replace(/\[Имя\]/g, name).replace(/\[Название клиента\]/g, 'Компания');
}

function renderLines(lines) {
    return lines.map(line => {
        let text = replacePlaceholders(line.text);
        let cls = 'script-line';
        let icon = '';
        if (line.type === 'condition-positive') { cls += ' script-condition-positive'; icon = '✅ '; }
        else if (line.type === 'condition-negative') { cls += ' script-condition-negative'; icon = '❌ '; }
        else if (line.type === 'condition-neutral') { cls += ' script-condition-neutral'; icon = '👉 '; }
        else { cls += ' script-speech'; }
        return `<div class="${cls}">${icon}${text}</div>`;
    }).join('');
}

function renderGallery(items) {
    if (!items || items.length === 0) return '';
    let html = '';
    items.forEach((item, idx) => {
        html += `<div class="gallery-item" onclick="openLightboxImage('${item.full}')">
                    <img src="${item.thumb}" alt="Пример работы">
                 </div>`;
    });
    return `<div class="gallery">${html}</div>`;
}

function renderLetterBlock(blocks) {
    const savedName = localStorage.getItem('managerName') || '';
    let html = `<div class="script-block collapsed" id="ilya-letter">
        <div class="block-header" onclick="toggleBlock(this)">
            <span><span class="arrow">▶</span> <span class="block-title">✉️ Генератор письма</span></span>
            <span class="block-goal">Сопроводительное письмо</span>
        </div>
        <div class="block-body">
            <div class="letter-box">
                <div style="font-weight:600; margin-bottom:8px;">Выберите блоки для письма:</div>
                <div class="letter-options" id="letterOptions">`;
    const labels = ['А','Б','В','Г','Д'];
    blocks.forEach((b, i) => {
        const checked = (b.id === 'B' || b.id === 'direct') ? 'checked' : '';
        html += `<label><input type="checkbox" data-block="${b.id}" ${checked} onchange="updateLetterPreview()"> ${labels[i] || b.id}</label>`;
    });
    html += `</div>
                <div class="letter-manager-field">
                    <label>👤 Ваше имя: <input type="text" id="managerNameLetter" placeholder="Иван" value="${savedName}" oninput="updateLetterPreview()"></label>
                </div>
                <textarea id="letterPreview" class="letter-preview" rows="8" spellcheck="false"></textarea>
                <div class="letter-actions">
                    <button class="btn btn-light" onclick="copyLetter()">📋 Копировать письмо</button>
                </div>
            </div>
        </div>
    </div>`;
    setTimeout(() => {
        updateLetterPreview();
        const nameField = document.getElementById('managerNameLetter');
        if (nameField) {
            nameField.addEventListener('input', function() {
                localStorage.setItem('managerName', this.value);
            });
        }
    }, 50);
    return html;
}

function getBriefText(blockText) {
    const briefMatch = blockText.match(/<span class="brief-label">Кратко:<\/span>\s*(.*?)(?:\s*—|$)/s);
    if (briefMatch && briefMatch[1]) {
        let brief = briefMatch[1].trim();
        brief = brief.replace(/["«»]/g, '');
        return brief;
    }
    return blockText.replace(/<[^>]*>/g, '').trim();
}

function updateLetterPreview() {
    const checks = document.querySelectorAll('#ilya-letter input[type=checkbox]');
    const selectedIds = [];
    checks.forEach(cb => { if (cb.checked) selectedIds.push(cb.dataset.block); });
    const industryKey = document.getElementById('industrySelect').value;
    const data = industryData[industryKey];
    if (!data) return;
    let letter = 'Здравствуйте!\n\n';
    data.blocks.forEach(b => {
        if (!selectedIds.includes(b.id)) return;
        let text = b.text;
        if (b.id === 'B') {
            text = getBriefText(text);
        } else {
            text = text.replace(/<[^>]*>/g, '').trim();
            text = text.replace(/["«»]/g, '');
        }
        if (text) letter += replacePlaceholders(text) + '\n\n';
    });
    const nameField = document.getElementById('managerNameLetter');
    const managerName = nameField ? nameField.value.trim() : localStorage.getItem('managerName') || 'Менеджер';
    letter += 'С уважением,\n' + managerName + '\nКомпания Паркс Инжиниринг';
    const preview = document.getElementById('letterPreview');
    if (preview) preview.value = letter;
}

function copyLetter() {
    const preview = document.getElementById('letterPreview');
    if (preview) {
        navigator.clipboard.writeText(preview.value)
            .then(() => alert('Письмо скопировано в буфер обмена!'))
            .catch(() => alert('Не удалось скопировать. Скопируйте текст вручную.'));
    }
}

// ---------- ОСНОВНЫЕ ФУНКЦИИ РЕНДЕРИНГА ----------
function renderIlyaBlocks(industryKey) {
    const data = industryData[industryKey];
    if (!data) return;
    const container = document.getElementById('approachContent');
    let html = '';
    data.blocks.forEach((b, i) => {
        let displayText = replacePlaceholders(b.text);
        html += `<div class="script-block collapsed" data-block-id="${b.id}">
            <div class="block-header" onclick="toggleBlock(this)">
                <span><span class="arrow">▶</span> <span class="block-title">${b.icon} ${b.title}</span></span>
                <div style="display:flex;align-items:center;gap:4px;">
                    <span class="block-goal">${b.goal}</span>
                    <button class="copy-btn" title="Скопировать текст" onclick="event.stopPropagation(); copyBlockText('${b.id}')">📋</button>
                </div>
            </div>
            <div class="block-body"><div class="script-text">${displayText}</div></div>
        </div>`;
    });
    html += renderLetterBlock(data.blocks);
    if (data.gallery && data.gallery.length) {
        html += `<div class="script-block collapsed" id="ilya-gallery">
            <div class="block-header" onclick="toggleBlock(this)"><span><span class="arrow">▶</span> <span class="block-title">📸 Примеры готовых деталей</span></span><span class="block-goal">Нажмите для увеличения</span></div>
            <div class="block-body">${renderGallery(data.gallery)}</div></div>`;
    }
    const topHtml = renderTopCompanies(industryKey);
    if (topHtml) {
        html += `<div class="script-block collapsed" id="ilya-top">
            <div class="block-header" onclick="toggleBlock(this)"><span><span class="arrow">▶</span> <span class="block-title">🏢 Топ компаний отрасли</span></span><span class="block-goal">Список крупнейших игроков отрасли для ориентира</span></div>
            <div class="block-body">${topHtml}</div></div>`;
    }
    container.innerHTML = html;
    updateToggleAllButton();
}

function renderApproach(approach) {
    const industrySelector = document.getElementById('industrySelector');
    const container = document.getElementById('approachContent');
    if (approach === 'ilya') {
        industrySelector.style.display = 'flex';
        const select = document.getElementById('industrySelect');
        renderIlyaBlocks(select.value);
    } else {
        industrySelector.style.display = 'none';
        container.innerHTML = `
            <div class="switch-tabs" id="vladTabs">
                <button class="switch-tab active" data-vlad-tab="secretary">🔑 Проход секретаря</button>
                <button class="switch-tab" data-vlad-tab="reactions">🗣️ Реакции секретаря</button>
                <button class="switch-tab" data-vlad-tab="lpr">👤 Работа с ЛПР</button>
            </div>
            <div id="vladContent"></div>
        `;
        renderVladTab('secretary');
    }
}

function renderVladTab(tab) {
    const container = document.getElementById('vladContent');
    let html = '';
    if (tab === 'secretary') {
        vladSecretaryVariants.forEach((v, i) => {
            html += `<div class="script-block collapsed" id="vlad-sec-${i}">
                <div class="block-header" onclick="toggleBlock(this)"><span><span class="arrow">▶</span> <span class="block-title">${v.title}</span></span><span class="block-goal">Приветствие, проход секретаря</span></div>
                <div class="block-body"><div class="script-text">${renderLines(v.lines)}</div></div></div>`;
        });
    } else if (tab === 'reactions') {
        vladReactions.forEach((r, i) => {
            html += `<div class="script-block collapsed" id="vlad-react-${i}">
                <div class="block-header" onclick="toggleBlock(this)"><span><span class="arrow">▶</span> <span class="block-title">${r.title}</span></span><span class="block-goal">Ответ менеджера</span></div>
                <div class="block-body"><div class="script-text">${renderLines(r.lines)}</div></div></div>`;
        });
    } else if (tab === 'lpr') {
        vladLprBlocks.forEach((b, i) => {
            html += `<div class="script-block collapsed" id="vlad-lpr-${i}">
                <div class="block-header" onclick="toggleBlock(this)"><span><span class="arrow">▶</span> <span class="block-title">${b.title}</span></span><span class="block-goal"></span></div>
                <div class="block-body"><div class="script-text">${renderLines(b.lines)}</div></div></div>`;
        });
    }
    container.innerHTML = html;
    updateToggleAllButton();
}

window.toggleBlock = function(header) {
    const block = header.parentElement;
    block.classList.toggle('collapsed');
    const arrow = block.querySelector('.arrow');
    if (arrow) arrow.textContent = block.classList.contains('collapsed') ? '▶' : '▼';
    updateToggleAllButton();
};

window.copyBlockText = function(blockId) {
    const block = document.querySelector(`.script-block[data-block-id="${blockId}"]`);
    if (!block) return;
    const text = block.querySelector('.script-text')?.innerText || '';
    navigator.clipboard.writeText(text).then(() => {
        const btn = block.querySelector('.copy-btn');
        if (btn) {
            btn.textContent = '✓';
            setTimeout(() => { btn.textContent = '📋'; }, 1500);
        }
    });
};

function toggleAllBlocks() {
    const approach = document.querySelector('.approach-tab.active')?.dataset.approach;
    let blocks;
    if (approach === 'ilya') {
        blocks = document.querySelectorAll('#approachContent .script-block');
    } else {
        blocks = document.querySelectorAll('#vladContent .script-block');
    }
    const anyCollapsed = Array.from(blocks).some(block => block.classList.contains('collapsed'));
    blocks.forEach(block => {
        if (anyCollapsed) {
            block.classList.remove('collapsed');
            const arrow = block.querySelector('.arrow');
            if (arrow) arrow.textContent = '▼';
        } else {
            block.classList.add('collapsed');
            const arrow = block.querySelector('.arrow');
            if (arrow) arrow.textContent = '▶';
        }
    });
    updateToggleAllButton();
}

function updateToggleAllButton() {
    const approach = document.querySelector('.approach-tab.active')?.dataset.approach;
    let blocks;
    if (approach === 'ilya') {
        blocks = document.querySelectorAll('#approachContent .script-block');
    } else {
        blocks = document.querySelectorAll('#vladContent .script-block');
    }
    const anyCollapsed = Array.from(blocks).some(block => block.classList.contains('collapsed'));
    const icon = document.getElementById('toggleAllIcon');
    const text = document.getElementById('toggleAllText');
    if (icon && text) {
        if (anyCollapsed) {
            icon.textContent = '⇵';
            text.textContent = 'Развернуть всё';
        } else {
            icon.textContent = '⇅';
            text.textContent = 'Свернуть всё';
        }
    }
}

// Лайтбокс
function openLightboxImage(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
    document.getElementById('lightboxImg').src = '';
}
document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
});

// Тема
function toggleTheme() {
    document.body.classList.toggle('dark');
    const btn = document.querySelector('.header-row .btn-light');
    if (btn) btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
(function() {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        const btn = document.querySelector('.header-row .btn-light');
        if (btn) btn.textContent = '☀️';
    }
})();

// Печать
function printScript() {
    const approach = document.querySelector('.approach-tab.active')?.dataset.approach;
    let content = '';
    if (approach === 'ilya') {
        const select = document.getElementById('industrySelect');
        const data = industryData[select.value];
        content += `${data.name}\n\n`;
        data.blocks.forEach(b => {
            content += `${b.title}\n${replacePlaceholders(b.text)}\n\n`;
        });
    } else {
        content += 'Универсальный скрипт\n\n';
        content += 'Проход секретаря\n';
        vladSecretaryVariants.forEach(v => { content += `${v.lines.map(l => replacePlaceholders(l.text)).join('\n')}\n\n`; });
        content += 'Реакции секретаря\n';
        vladReactions.forEach(v => { content += `${v.lines.map(l => replacePlaceholders(l.text)).join('\n')}\n\n`; });
        content += 'Работа с ЛПР\n';
        vladLprBlocks.forEach(v => { content += `${v.lines.map(l => replacePlaceholders(l.text)).join('\n')}\n\n`; });
    }
    const w = window.open('', '_blank', 'width=800,height=600');
    w.document.write(`<pre style="white-space: pre-wrap; font-family: Arial; padding: 20px;">${content}</pre>`);
    w.document.close();
}

// Панель возражений
const overlay = document.getElementById('overlay');
const panel = document.getElementById('objPanel');
const toggleFullscreenBtn = document.getElementById('toggleFullscreenBtn');
let isFullscreen = false;

document.getElementById('openPanelBtn').onclick = () => {
    panel.classList.add('open');
    panel.classList.remove('fullscreen');
    isFullscreen = false;
    overlay.classList.add('show');
    renderObjections();
};

document.getElementById('closePanelBtn').onclick = () => {
    panel.classList.remove('open', 'fullscreen');
    overlay.classList.remove('show');
    isFullscreen = false;
};
overlay.onclick = () => {
    panel.classList.remove('open', 'fullscreen');
    overlay.classList.remove('show');
    isFullscreen = false;
};
toggleFullscreenBtn.onclick = () => {
    isFullscreen = !isFullscreen;
    if (isFullscreen) {
        panel.classList.add('fullscreen');
        overlay.classList.add('show');
    } else {
        panel.classList.remove('fullscreen');
    }
};

function renderObjections() {
    const search = (document.getElementById('objSearch').value || '').toLowerCase();
    let html = '';
    html += `<div class="obj-quick-links">`;
    objections.forEach((group, index) => {
        const visible = group.items.some(item => {
            return item.q.toLowerCase().includes(search) || item.answers.some(a => a.toLowerCase().includes(search));
        });
        if (!search || visible) {
            html += `<span class="obj-quick-link" data-group-index="${index}">${group.group}</span>`;
        }
    });
    html += `</div>`;

    objections.forEach((group, index) => {
        const filteredItems = group.items.filter(item => {
            return !search || item.q.toLowerCase().includes(search) || item.answers.some(a => a.toLowerCase().includes(search));
        });
        if (filteredItems.length === 0 && search) return;
        html += `<div class="obj-group collapsed" data-group-index="${index}">`;
        html += `<div class="obj-group-title"><span>${group.group}</span><span class="group-arrow">▶</span></div>`;
        html += `<div class="obj-group-content">`;
        filteredItems.forEach(item => {
            html += `<div class="obj-item"><div class="obj-question">${item.q}</div>`;
            if (item.answers && item.answers.length > 0) {
                html += `<ul class="obj-answer-list">`;
                const letters = ['а', 'б', 'в', 'г', 'д', 'е'];
                item.answers.forEach((ans, idx) => {
                    html += `<li><span class="obj-answer-letter">${letters[idx] || (idx+1)})</span><span class="obj-answer">${replacePlaceholders(ans)}</span></li>`;
                });
                html += `</ul>`;
            }
            html += `</div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('objContent').innerHTML = html;

    document.querySelectorAll('.obj-group-title').forEach(title => {
        title.addEventListener('click', function(e) {
            const group = this.parentElement;
            group.classList.toggle('expanded');
        });
    });
    document.querySelectorAll('.obj-quick-link').forEach(link => {
        link.addEventListener('click', function(e) {
            const index = this.dataset.groupIndex;
            const group = document.querySelector(`.obj-group[data-group-index="${index}"]`);
            if (group) {
                document.querySelectorAll('.obj-group').forEach(g => g.classList.remove('expanded'));
                group.classList.add('expanded');
                group.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });
}

// Обработчики переключения отраслей и вкладок
document.getElementById('industrySelect').addEventListener('change', function() {
    const desc = industryDescriptions[this.value] || '';
    document.getElementById('industryDescription').innerHTML = formatDescription(desc);
    if (document.querySelector('.approach-tab.active')?.dataset.approach === 'ilya') {
        renderIlyaBlocks(this.value);
    }
    localStorage.setItem('lastIndustry', this.value);
});

document.getElementById('approachTabs').addEventListener('click', e => {
    if (e.target.classList.contains('approach-tab')) {
        document.querySelectorAll('#approachTabs .approach-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        renderApproach(e.target.dataset.approach);
        if (e.target.dataset.approach === 'ilya') {
            const select = document.getElementById('industrySelect');
            document.getElementById('industryDescription').innerHTML = formatDescription(industryDescriptions[select.value] || '');
        } else {
            document.getElementById('industryDescription').innerHTML = '';
        }
    }
});

document.addEventListener('click', e => {
    if (e.target.classList.contains('switch-tab') && e.target.dataset.vladTab) {
        document.querySelectorAll('#vladTabs .switch-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        renderVladTab(e.target.dataset.vladTab);
    }
});

// Инициализация
const lastIndustry = localStorage.getItem('lastIndustry') || 'pharma';
document.getElementById('industrySelect').value = lastIndustry;
document.getElementById('industryDescription').innerHTML = formatDescription(industryDescriptions[lastIndustry] || '');
renderApproach('ilya');
</script>
